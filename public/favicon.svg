<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Solid black background circle -->
  <circle cx="50" cy="50" r="46" fill="#000000" />
  
  <!-- Calendar container group with white strokes -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Calendar Body -->
    <rect x="30" y="32" width="40" height="38" rx="4" fill="none" />
    
    <!-- Top binders/hooks -->
    <path d="M40 24 v8" />
    <path d="M60 24 v8" />
    
    <!-- Horizontal header divider line -->
    <path d="M30 43 h40" />
    
    <!-- Calendar grid dots/squares (rendered as simple filled or thick stroke squares) -->
    <rect x="37" y="50" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
    <rect x="47.5" y="50" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
    <rect x="58" y="50" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
    <rect x="37" y="60" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
    <rect x="47.5" y="60" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
    <rect x="58" y="60" width="5" height="5" rx="0.5" fill="#ffffff" stroke="none" />
  </g>
</svg>